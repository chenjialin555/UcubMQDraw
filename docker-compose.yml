services:
  postgres:
    image: postgres:16
    container_name: ucub_mqdraw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ucub_mqdraw
      POSTGRES_USER: ucub
      POSTGRES_PASSWORD: ucub_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ucub -d ucub_mqdraw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: ucub_mqdraw_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ucub_redis_password
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ucub_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
